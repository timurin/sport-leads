name: Project checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sport_leads
          POSTGRES_USER: sport_leads
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sport_leads -d sport_leads"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_DB: sport_leads
      POSTGRES_USER: sport_leads
      POSTGRES_PASSWORD: ci_password
      DATABASE_URL: postgresql+psycopg2://sport_leads:ci_password@127.0.0.1:5432/sport_leads

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply migrations
        run: |
          alembic upgrade head

      - name: Run project checks
        run: |
          python scripts/check_project.py